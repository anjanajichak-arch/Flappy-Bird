<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flappy Bird</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #FDF8F6;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
    }
    canvas {
      display: block;
      border: 4px solid #E7E0DE;
      box-shadow: 0 10px 40px rgba(156,65,61,0.1);
      border-radius: 12px;
      max-width: 100%;
      height: auto;
    }
    #hint {
      color: #775652;
      font-size: 14px;
      font-weight: bold;
      margin-top: 16px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">SPACE / CLICK / TAP to flap</div>
<script>
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');

  const W = 400, H = 600;
  canvas.width  = W;
  canvas.height = H;

  // ── Constants ─────────────────────────────────────────────
  const GRAVITY       = 0.42;
  const FLAP_FORCE    = -8.2;
  const PIPE_SPEED    = 2.6;
  const PIPE_GAP      = 155;
  const PIPE_W        = 58;
  const PIPE_INTERVAL = 1750; // ms
  const GROUND_H      = 28;
  const BIRD_R        = 14;

  // ── State ─────────────────────────────────────────────────
  let state = 'start'; // 'start' | 'playing' | 'dead'
  let score = 0, best = 0, frames = 0;

  // ── Bird ──────────────────────────────────────────────────
  const bird = { x: W * 0.25, y: H / 2, vy: 0, angle: 0, trail: [] };

  // ── Pipes ─────────────────────────────────────────────────
  let pipes = [], lastPipe = 0;

  // ── Particles ─────────────────────────────────────────────
  let particles = [];

  // ── Stars ─────────────────────────────────────────────────
  const stars = Array.from({ length: 40 }, () => ({
    x: Math.random() * W,
    y: Math.random() * H * 0.85,
    r: Math.random() * 2 + 1,
    phase: Math.random() * Math.PI * 2
  }));

  // ── Clouds (parallax layers) ───────────────────────────────
  const clouds = Array.from({ length: 6 }, (_, i) => ({
    x: Math.random() * W,
    y: 60 + Math.random() * 160,
    w: 60 + Math.random() * 80,
    speed: 0.25 + Math.random() * 0.35,
    alpha: 0.5 + Math.random() * 0.3
  }));

  // ── Helpers ───────────────────────────────────────────────
  function rand(a, b) { return Math.random() * (b - a) + a; }

  // ── Audio & Vibration ───────────────────────────────────────
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  let audioCtx;
  
  function initAudio() {
    if (!audioCtx) {
      audioCtx = new AudioContext();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }

  function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    const now = audioCtx.currentTime;
    
    if (type === 'flap') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(300, now);
      osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
      osc.start(now);
      osc.stop(now + 0.1);
    } else if (type === 'score') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, now);
      osc.frequency.setValueAtTime(800, now + 0.05);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.linearRampToValueAtTime(0.01, now + 0.1);
      osc.start(now);
      osc.stop(now + 0.1);
    } else if (type === 'die') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.exponentialRampToValueAtTime(50, now + 0.4);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.linearRampToValueAtTime(0.01, now + 0.4);
      osc.start(now);
      osc.stop(now + 0.4);
    }
  }

  function vibrate(pattern) {
    if (navigator.vibrate) {
      navigator.vibrate(pattern);
    }
  }

  function emit(x, y, n, opts = {}) {
    for (let i = 0; i < n; i++) {
      const angle = opts.ring
        ? (i / n) * Math.PI * 2
        : rand(0, Math.PI * 2);
      const speed = opts.ring ? rand(2, 5) : rand(0.5, 3);
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed * (opts.ring ? 1 : rand(0.5, 1.5)),
        vy: Math.sin(angle) * speed + (opts.ring ? 0 : rand(-1, 0)),
        life: 1,
        decay: opts.decay || rand(0.025, 0.06),
        size: opts.size || rand(2, 6),
        color: Math.random() < 0.5 ? '#9C413D' : '#FFDAD4'
      });
    }
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  // ── Reset ─────────────────────────────────────────────────
  function reset() {
    bird.x = W * 0.25; bird.y = H / 2;
    bird.vy = 0; bird.angle = 0; bird.trail = [];
    pipes = []; lastPipe = 0;
    score = 0; frames = 0; particles = [];
  }

  // ── Flap ──────────────────────────────────────────────────
  function flap() {
    initAudio();
    if (state === 'start') {
      state = 'playing';
      lastPipe = performance.now();
    }
    if (state === 'playing') {
      bird.vy = FLAP_FORCE;
      playSound('flap');
      vibrate(20);
      emit(bird.x - BIRD_R, bird.y + BIRD_R * 0.6, 8, { decay: 0.08, size: 4 });
    }
    if (state === 'dead') {
      state = 'start';
      reset();
    }
  }

  document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); }
  });
  canvas.addEventListener('mousedown', flap);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, { passive: false });

  // ── Pipe spawn ────────────────────────────────────────────
  function spawnPipe() {
    const topH = rand(70, H - GROUND_H - 70 - PIPE_GAP);
    pipes.push({ x: W + PIPE_W, topH, passed: false });
  }

  // ── Collision ─────────────────────────────────────────────
  function collides() {
    if (bird.y - BIRD_R + 4 <= 0) return true;
    if (bird.y + BIRD_R - 4 >= H - GROUND_H) return true;
    for (const p of pipes) {
      if (bird.x + BIRD_R - 6 > p.x && bird.x - BIRD_R + 6 < p.x + PIPE_W) {
        if (bird.y - BIRD_R + 6 < p.topH || bird.y + BIRD_R - 6 > p.topH + PIPE_GAP) return true;
      }
    }
    return false;
  }

  // ── Draw functions ────────────────────────────────────────

  function drawBG() {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0,   '#FDF8F6');
    g.addColorStop(0.6, '#F2E7E4');
    g.addColorStop(1,   '#E7E0DE');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }

  function drawStars(t) {
    const yShift = (bird.y - H/2) * 0.02;
    for (const s of stars) {
      const a = 0.55 + 0.45 * Math.sin(t * 0.0015 + s.phase);
      ctx.globalAlpha = a;
      ctx.fillStyle = '#9C413D';
      ctx.beginPath();
      ctx.rect(s.x, s.y - yShift, s.r * 1.5, s.r * 1.5);
      ctx.fill();

      if (state === 'playing') {
        s.x -= s.r * 0.15;
        if (s.x < 0) s.x = W + s.r * 1.5;
      }
    }
    ctx.globalAlpha = 1;
  }

  function drawClouds() {
    const yShift = (bird.y - H/2) * 0.05;
    for (const c of clouds) {
      ctx.globalAlpha = c.alpha;
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.fillRect(c.x, c.y - 10 - yShift, c.w, 20);
      if (state === 'playing') c.x -= c.speed;
      if (c.x + c.w < 0) c.x = W + c.w;
    }
    ctx.globalAlpha = 1;
  }

  function drawGround() {
    // Dirt
    ctx.fillStyle = '#775652';
    ctx.fillRect(0, H - GROUND_H, W, GROUND_H);
    // Grass
    ctx.fillStyle = '#9C413D';
    ctx.fillRect(0, H - GROUND_H, W, 7);
    // Grass highlight
    ctx.fillStyle = '#7D322F';
    ctx.fillRect(0, H - GROUND_H, W, 3);
    // Moving tufts
    const off = state === 'playing' ? (frames * PIPE_SPEED) % 48 : 0;
    ctx.fillStyle = '#7D322F';
    for (let x = -off; x < W + 50; x += 48) {
      ctx.fillRect(x, H - GROUND_H - 8, 12, 8);
      ctx.fillRect(x + 22, H - GROUND_H - 6, 12, 6);
    }
  }

  function drawPipe(p) {
    const bot = p.topH + PIPE_GAP;

    function drawTube(x, y, w, h, capUp) {
      // shadow
      ctx.fillStyle = 'rgba(0,0,0,0.08)';
      ctx.fillRect(x + 5, y, w, h);

      // body gradient
      const grd = ctx.createLinearGradient(x, 0, x + w, 0);
      grd.addColorStop(0,    '#7D322F');
      grd.addColorStop(0.35, '#9C413D');
      grd.addColorStop(0.65, '#9C413D');
      grd.addColorStop(1,    '#410002');
      ctx.fillStyle = grd;
      ctx.fillRect(x, y, w, h);

      // edge highlight
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(x + 3, y, 5, h);

      // cap
      const capH = 22, capX = x - 6, capW = w + 12;
      const capY = capUp ? y + h - capH : y;

      ctx.fillStyle = '#7D322F';
      ctx.fillRect(capX, capY, capW, capH);

      // cap top shine
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.fillRect(capX, capY, capW, 5);
      ctx.fillStyle = 'rgba(255,255,255,0.1)';
      ctx.fillRect(capX, capY, 7, capH);

      // cap bottom shadow
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.fillRect(capX, capY + capH - 4, capW, 4);
    }

    drawTube(p.x, 0, PIPE_W, p.topH, true);
    drawTube(p.x, bot, PIPE_W, H - bot - GROUND_H, false);
  }

  function drawTrail() {
    for (let i = 0; i < bird.trail.length; i++) {
      const t = bird.trail[i];
      const a = (i / bird.trail.length) * 0.35;
      ctx.globalAlpha = a;
      ctx.fillStyle = '#FFDAD4';
      ctx.beginPath();
      const s = BIRD_R * (i / bird.trail.length) * 1.2;
      ctx.rect(t.x - s/2, t.y - s/2, s, s);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawBird(t) {
    ctx.save();
    ctx.translate(bird.x, bird.y);
    ctx.rotate((bird.angle * Math.PI) / 180);

    // glow
    const gl = ctx.createRadialGradient(0, 0, 1, 0, 0, BIRD_R * 2.5);
    gl.addColorStop(0,   'rgba(255,218,212,0.8)');
    gl.addColorStop(0.5, 'rgba(255,218,212,0.3)');
    gl.addColorStop(1,   'rgba(255,218,212,0)');
    ctx.fillStyle = gl;
    ctx.beginPath();
    ctx.arc(0, 0, BIRD_R * 2.5, 0, Math.PI * 2);
    ctx.fill();

    // body
    ctx.fillStyle = '#1C1B1F';
    ctx.beginPath();
    ctx.rect(-BIRD_R, -BIRD_R, BIRD_R * 2, BIRD_R * 2);
    ctx.fill();

    // belly highlight
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.beginPath();
    ctx.rect(-BIRD_R + 2, -BIRD_R + 2, BIRD_R * 2 - 4, 6);
    ctx.fill();

    // wing
    const wa = Math.sin(t * 0.15) * 0.5;
    ctx.save();
    ctx.translate(-4, 4);
    ctx.rotate(wa);
    ctx.fillStyle = '#775652';
    ctx.beginPath();
    ctx.rect(-6, -4, 12, 8);
    ctx.fill();
    ctx.restore();

    // eye white
    ctx.fillStyle = '#FFDAD4';
    ctx.beginPath();
    ctx.rect(3, -9, 7, 7);
    ctx.fill();

    // pupil
    ctx.fillStyle = '#9C413D';
    ctx.beginPath();
    ctx.rect(6, -6, 4, 4);
    ctx.fill();

    // beak
    ctx.fillStyle = '#9C413D';
    ctx.beginPath();
    ctx.rect(BIRD_R, -2, 8, 5);
    ctx.fill();

    ctx.restore();
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.rect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawScore() {
    ctx.textAlign = 'center';
    ctx.font = 'bold 48px "Courier New"';
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    ctx.fillText(score, W / 2 + 3, 73);
    ctx.fillStyle = '#410002';
    ctx.fillText(score, W / 2, 70);
  }

  function drawStart(t) {
    ctx.textAlign = 'center';

    // Bird preview bounce
    const by = H / 2 - 100 + Math.sin(t * 0.003) * 8;
    ctx.save(); ctx.translate(bird.x + 120, by + 20); ctx.scale(1.4, 1.4);
    // mini glow
    const mg = ctx.createRadialGradient(0,0,1,0,0,BIRD_R*2);
    mg.addColorStop(0,'rgba(255,218,212,0.6)'); mg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle = mg; ctx.beginPath(); ctx.arc(0,0,BIRD_R*2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#1C1B1F'; ctx.fillRect(-BIRD_R, -BIRD_R, BIRD_R*2, BIRD_R*2);
    // wing
    ctx.fillStyle = '#775652'; ctx.fillRect(-8, 1, 10, 6);
    // beak
    ctx.fillStyle = '#9C413D'; ctx.fillRect(BIRD_R, -2, 6, 4);
    // eye
    ctx.fillStyle = '#FFDAD4'; ctx.fillRect(2, -7, 5, 5);
    ctx.fillStyle = '#9C413D'; ctx.fillRect(4, -5, 3, 3);
    ctx.restore();

    // title
    ctx.shadowColor = 'rgba(156,65,61,0.2)'; ctx.shadowBlur = 10;
    ctx.fillStyle = '#9C413D'; ctx.font = 'bold 54px "Courier New"';
    ctx.fillText('FLAPPY', W / 2, H / 2 - 30);
    ctx.fillStyle = '#7D322F'; ctx.font = 'bold 40px "Courier New"';
    ctx.fillText('BIRD', W / 2, H / 2 + 16);
    ctx.shadowBlur = 0;

    // prompt
    const pulse = 0.5 + 0.5 * Math.sin(t * 0.0035);
    ctx.globalAlpha = 0.6 + 0.4 * pulse;
    ctx.fillStyle = '#1C1B1F'; ctx.font = 'bold 18px "Courier New"';
    ctx.fillText('TAP TO FLY', W / 2, H / 2 + 70);
    ctx.globalAlpha = 1;

    if (best > 0) {
      ctx.fillStyle = '#775652';
      ctx.font = 'bold 14px "Courier New"';
      ctx.fillText(`BEST SCORE: ${best}`, W / 2, H / 2 + 100);
    }
  }

  function drawDead(t) {
    // light overlay
    ctx.fillStyle = 'rgba(253,248,246,0.85)';
    ctx.fillRect(0, 0, W, H);

    ctx.textAlign = 'center';

    ctx.shadowColor = 'rgba(156,65,61,0.2)'; ctx.shadowBlur = 10;
    ctx.fillStyle = '#9C413D'; ctx.font = 'bold 42px "Courier New"';
    ctx.fillText('GAME OVER', W / 2, H / 2 - 70);
    ctx.shadowBlur = 0;

    // score panel
    const px = W / 2 - 110, py = H / 2 - 35, pw = 220, ph = 100;
    ctx.fillStyle = '#F2E7E4';
    roundRect(px, py, pw, ph, 16);
    ctx.fill();
    ctx.strokeStyle = '#E7E0DE';
    ctx.lineWidth = 2;
    roundRect(px, py, pw, ph, 16);
    ctx.stroke();

    ctx.fillStyle = '#775652';
    ctx.font = 'bold 13px "Courier New"';
    ctx.fillText('SCORE', W / 2 - 55, H / 2 - 8);
    ctx.fillText('BEST', W / 2 + 55, H / 2 - 8);

    ctx.fillStyle = '#410002'; ctx.font = 'bold 36px "Courier New"';
    ctx.fillText(score, W / 2 - 55, H / 2 + 34);
    ctx.fillStyle = '#9C413D';
    ctx.fillText(best, W / 2 + 55, H / 2 + 34);

    // medal
    if (score >= 10) {
      ctx.save(); ctx.translate(W / 2, H / 2 - 5);
      const medal = score >= 30 ? '#FFDAD4' : score >= 20 ? '#E7E0DE' : '#9C413D';
      ctx.fillStyle = medal;
      ctx.beginPath(); ctx.rect(-12, -12, 24, 24); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.beginPath(); ctx.rect(-8, -8, 16, 16); ctx.fill();
      ctx.restore();
    }

    const pulse = 0.5 + 0.5 * Math.sin(t * 0.004);
    ctx.globalAlpha = 0.6 + 0.4 * pulse;
    ctx.fillStyle = '#1C1B1F'; ctx.font = 'bold 16px "Courier New"';
    ctx.fillText('TAP TO RETRY', W / 2, H / 2 + 95);
    ctx.globalAlpha = 1;
  }

  // ── Game loop ─────────────────────────────────────────────
  function loop(t) {
    requestAnimationFrame(loop);

    drawBG();
    drawStars(t);
    drawClouds();

    // ── Update ────────────────────────────────────────────
    if (state === 'playing') {
      frames++;

      // Physics
      bird.vy += GRAVITY;
      bird.y  += bird.vy;
      bird.angle = Math.max(-28, Math.min(78, bird.vy * 3.2));

      // Trail
      bird.trail.unshift({ x: bird.x, y: bird.y });
      if (bird.trail.length > 15) bird.trail.pop();

      // Pipes
      if (t - lastPipe > PIPE_INTERVAL) { spawnPipe(); lastPipe = t; }
      for (const p of pipes) {
        p.x -= PIPE_SPEED;
        if (!p.passed && p.x + PIPE_W < bird.x) {
          p.passed = true;
          score++;
          playSound('score');
        }
      }
      pipes = pipes.filter(p => p.x + PIPE_W + 10 > 0);

      // Particles update
      for (const p of particles) {
        p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life -= p.decay;
      }
      particles = particles.filter(p => p.life > 0);

      // Collision
      if (collides()) {
        best = Math.max(best, score);
        state = 'dead';
        playSound('die');
        vibrate([50, 50, 50]);
        emit(bird.x, bird.y, 30, { ring: true, decay: 0.02, size: 6 });
      }
    } else if (state === 'dead') {
      // Still update particles after death
      for (const p of particles) {
        p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life -= p.decay;
      }
      particles = particles.filter(p => p.life > 0);
    }

    // ── Render ────────────────────────────────────────────
    for (const p of pipes) drawPipe(p);
    drawGround();
    drawTrail();
    drawParticles();

    if (state !== 'dead') drawBird(t);

    if (state === 'playing') drawScore();
    if (state === 'start')   drawStart(t);
    if (state === 'dead')    drawDead(t);
  }

  requestAnimationFrame(loop);
</script>
</body>
</html>
